server {
    listen 80;
    server_name trust.yourcompany.com;  # 替换为您的域名或 IP
    
    # 重定向到 HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name trust.yourcompany.com;  # 替换为您的域名或 IP
    
    # SSL 证书配置
    ssl_certificate /etc/nginx/ssl/trust.crt;
    ssl_certificate_key /etc/nginx/ssl/trust.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    # 日志
    access_log /var/log/nginx/trust-access.log;
    error_log /var/log/nginx/trust-error.log;
    
    # 客户端大小限制
    client_max_body_size 50M;
    
    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # 静态文件
    location /static {
        alias /home/admin/openclaw/workspace/trust-system/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
