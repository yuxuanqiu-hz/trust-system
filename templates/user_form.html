<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ '编辑' if user else '添加' }}用户 - 股票管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f5f5f5; }
        .form-card { max-width: 600px; margin: 50px auto; background: white; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card p-5">
            <div class="text-center mb-4">
                <i class="bi bi-person-gear text-primary" style="font-size: 3rem;"></i>
                <h3 class="mt-3">{{ '编辑' if user else '添加' }}用户</h3>
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show">
                            {{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">姓名 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="name" value="{{ user.name if user else '' }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">手机号 <span class="text-danger">*</span></label>
                    <input type="tel" class="form-control" name="phone" value="{{ user.phone if user else '' }}" required maxlength="11">
                </div>
                <div class="mb-3">
                    <label class="form-label">工号</label>
                    <input type="text" class="form-control" name="employee_no" value="{{ user.employee_no if user else '' }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">邮箱</label>
                    <input type="email" class="form-control" name="email" value="{{ user.email if user else '' }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">角色 <span class="text-danger">*</span></label>
                    <select class="form-select" name="role" required>
                        <option value="user" {{ 'selected' if user and user.role == 'user' else '' }}>员工</option>
                        <option value="admin" {{ 'selected' if user and user.role == 'admin' else '' }}>管理员</option>
                    </select>
                    <div class="form-text">管理员可以管理用户和数据</div>
                </div>
                <div class="mb-3">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-control" name="password" placeholder="留空则不修改密码">
                    <div class="form-text">至少 6 位，留空则保持原密码</div>
                </div>
                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> 返回
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg"></i> 保存
                    </button>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
